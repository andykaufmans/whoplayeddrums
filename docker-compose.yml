version: '3.8'

services:
  whoplayeddrums:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    # Keeps container running and enables hot reload on Windows
    stdin_open: true
    tty: true
